<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Royal Street Kitchen | RSK Indore</title>
    <link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --black: #0a0a0a; --royal-red: #3a0d0d; }
        body { margin: 0; background: var(--black); background-image: radial-gradient(circle at center, var(--royal-red) 0%, var(--black) 100%); color: #fff; font-family: 'Poppins', sans-serif; overflow-x: hidden; }

        header { padding: 30px 20px; text-align: center; border-bottom: 1px solid rgba(212,175,55,0.3); }
        .main-logo { width: 100px; height: 100px; border-radius: 50%; border: 2px solid var(--gold); box-shadow: 0 0 20px var(--gold); }
        h1 { font-family: 'Marcellus', serif; color: var(--gold); margin: 15px 0 5px; letter-spacing: 2px; text-transform: uppercase; }
        .i-love-ind { width: 120px; margin-top: 5px; filter: drop-shadow(0 0 5px var(--gold)); }

        /* Welcome User Styling */
        #welcome-user { color: var(--gold); text-align: center; font-weight: bold; font-size: 16px; margin-top: 10px; min-height: 24px; font-family: 'Marcellus', serif; letter-spacing: 1px; }

        .bottom-nav { position: sticky; top: 0; z-index: 2000; width: 100%; background: rgba(15, 12, 5, 0.95); border-bottom: 2px solid var(--gold); display: flex; justify-content: space-around; padding: 15px 0; backdrop-filter: blur(10px); }
        .nav-item { color: #888; font-size: 11px; text-transform: uppercase; font-weight: 800; cursor: pointer; letter-spacing: 1px; transition: 0.3s; }
        .nav-item.active { color: var(--gold); border-bottom: 2px solid var(--gold); padding-bottom: 5px; text-shadow: 0 0 10px var(--gold); }

        .app-container { max-width: 500px; margin: 0 auto; min-height: 70vh; padding: 15px; padding-bottom: 50px; }
        #content-area { animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .insta-jumpu { position: fixed; bottom: 30px; right: 20px; z-index: 1001; width: 55px; height: 55px; border-radius: 50%; background: #fff; display: flex; justify-content: center; align-items: center; animation: jump 3s infinite; box-shadow: 0 0 15px var(--gold); text-decoration: none; }
        @keyframes jump { 0%, 20%, 50%, 80%, 100% {transform: translateY(0);} 40% {transform: translateY(-25px);} 60% {transform: translateY(-12px);} }

        .footer-section { text-align: center; padding: 30px 20px; border-top: 1px solid rgba(212,175,55,0.2); background: rgba(0,0,0,0.5); }
        .fssai-main { width: 180px; margin-bottom: 15px; }
        .sub-logos { display: flex; justify-content: center; gap: 25px; align-items: center; }
        .sub-logos img { height: 40px; filter: grayscale(1) invert(1); }
    </style>
</head>
<body>

<header>
    <img src="MAIN_LOGO.jpeg" class="main-logo" alt="RSK Logo">
    <h1>Royal Street Kitchen</h1>
    <img src="i_love_ind.png" class="i-love-ind" alt="I Love Indore">
    <div id="welcome-user"></div>
</header>

<div class="bottom-nav">
    <div class="nav-item" id="btn-home" onclick="showTab('home')">Home</div>
    <div class="nav-item" id="btn-menu" onclick="showTab('menu')">Menu</div>
    <div class="nav-item" id="btn-safar" onclick="showTab('safar')">Safar</div>
    <div class="nav-item" id="btn-reach" onclick="showTab('reach')">Reach</div>
</div>

<div class="app-container" id="content-area"></div>

<a href="https://www.instagram.com/rsk.indore/" class="insta-jumpu" target="_blank">
    <img src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Instagram_icon.png" width="30">
</a>

<div class="footer-section">
    <img src="FSSAI_Logo.png" class="fssai-main">
    <div class="sub-logos">
        <img src="msme_logo.avif" alt="MSME">
        <img src="Swachh_Bharat_Mission_Logo.png.png" alt="Swachh Bharat">
    </div>
</div>

<script>
    // --- 1. GLOBAL VARIABLES ---
    window.cart = []; 

    // --- 2. TAB MANAGEMENT (FETCH LOGIC) ---
    function showTab(tabId) {
        var navItems = document.getElementsByClassName('nav-item');
        for (var i = 0; i < navItems.length; i++) { navItems[i].classList.remove('active'); }
        const activeBtn = document.getElementById('btn-' + tabId);
        if(activeBtn) activeBtn.classList.add('active');

        const contentArea = document.getElementById('content-area');
        contentArea.innerHTML = "<div style='text-align:center; padding:50px;'>👑 Loading Royal Experience...</div>";

        fetch('./' + tabId + '-tab.html?v=' + Date.now())
            .then(response => {
                if (!response.ok) throw new Error("File Missing");
                return response.text();
            })
            .then(data => {
                contentArea.innerHTML = data;
                updateWelcomeHeader(); // Naam dikhane ke liye call
            })
            .catch(err => {
                contentArea.innerHTML = "<div style='text-align:center; padding:50px; color:red;'>Kripya check karein: " + tabId + "-tab.html nahi mili.</div>";
            });

        localStorage.setItem('activeTab', tabId);
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    // Header mein user ka naam update karna
    function updateWelcomeHeader() {
        const userName = localStorage.getItem('userName');
        const welcomeDiv = document.getElementById('welcome-user');
        if(userName && welcomeDiv) {
            welcomeDiv.innerHTML = "Namaste, " + userName + "! ✨";
        }
    }

    // --- 3. REGISTRATION & LOGIN (With WhatsApp Verification) ---
    window.registerUser = function() {
        let name = prompt("Royal Street Kitchen mein aapka swagat hai! Aapka Naam?");
        let phone = prompt("Aapka Mobile Number?");
        
        if(name && phone && phone.length >= 10) {
            let tempCode = Math.floor(1000 + Math.random() * 9000);
            alert("Verification Code: RSK-" + tempCode + "\n\nAgli screen par ye code WhatsApp par bhejein.");
            
            let verifyMsg = encodeURIComponent("Pranam RSK! Mera Verification Code hai: RSK-" + tempCode + " (Name: " + name + ")");
            window.open(`https://wa.me/917489999890?text=${verifyMsg}`, '_blank');

            localStorage.setItem('userName', name);
            localStorage.setItem('userPhone', phone);
            updateWelcomeHeader();
            return true;
        }
        alert("Sahi details dena zaroori hai.");
        return false;
    };

    // --- 4. CART & TOKEN LOGIC ---
    window.addToCart = function(name, price) {
        window.cart.push({name: name, price: price});
        alert(name + " cart mein add ho gaya!");
        const bar = document.getElementById('floatingCheckout');
        if(bar) bar.style.display = 'flex';
    };

    window.checkout = function() {
        let uName = localStorage.getItem('userName');
        let uPhone = localStorage.getItem('userPhone');

        if(!uName || !uPhone) {
            if(!window.registerUser()) return;
            uName = localStorage.getItem('userName');
            uPhone = localStorage.getItem('userPhone');
        }

        if(window.cart.length === 0) {
            alert("Pehle kuch tasty add toh kijiye!");
            return;
        }

        // --- FIXED TOKEN & MESSAGE LOGIC ---
        let tokenNo = Math.floor(Math.random() * 100) + 1; 
        let total = window.cart.reduce((sum, item) => sum + item.price, 0);
        let itemsList = window.cart.map(item => `- ${item.name}`).join('%0A');

        let message = `*ROYAL STREET KITCHEN* 👑%0A` +
                      `--------------------------%0A` +
                      `*Token No:* %23${tokenNo}%0A` + // %23 means #
                      `*Date:* ${new Date().toLocaleDateString('en-GB')}%0A` +
                      `*Customer:* ${uName}%0A` +
                      `*Phone:* ${uPhone}%0A` +
                      `--------------------------%0A` +
                      `*Order Details:*%0A${itemsList}%0A` +
                      `--------------------------%0A` +
                      `*Total Amount:* ₹${total}%0A` +
                      `--------------------------%0A` +
                      `_Kripya counter par token dikhayein._`;

        window.open(`https://wa.me/917489999890?text=${message}`, '_blank');
        
        window.cart = []; // Reset cart
        const bar = document.getElementById('floatingCheckout');
        if(bar) bar.style.display = 'none';
    };

    // --- 5. SEARCH & FILTER ---
    window.filterMenu = function() {
        let input = document.getElementById('menuSearch').value.toLowerCase();
        let cards = document.getElementsByClassName('item-card');
        for (let card of cards) {
            let name = card.getAttribute('data-name') || card.innerText.toLowerCase();
            card.style.display = name.includes(input) ? "block" : "none";
        }
    };

    window.filterItems = function(type) {
        const cards = document.querySelectorAll('.item-card');
        cards.forEach(card => {
            if (type === 'all') card.style.display = 'block';
            else card.style.display = card.classList.contains(type) ? 'block' : 'none';
        });
    };

    // --- 6. INITIAL LOAD ---
    window.onload = function() {
        var savedTab = localStorage.getItem('activeTab') || 'home';
        showTab(savedTab);
    };
</script>
</body>
</html>
