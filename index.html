    <style>
        /* --- 1. CORE COLOR SCHEME --- */
        :root { 
            --gold: #D4AF37; 
            --black: #0a0a0a; 
            --royal-red: #3a0d0d; 
            --gold-glow: rgba(212, 175, 55, 0.6); 
            --fire: #ff4500;
        }

        /* --- 2. GLOBAL RESET --- */
        body { 
            margin: 0; 
            background: var(--black); 
            background-image: radial-gradient(circle at center, var(--royal-red) 0%, var(--black) 100%); 
            color: #fff; 
            font-family: 'Poppins', sans-serif; 
            overflow-x: hidden; 
        }

        /* --- 3. HEADER & LOGO ANIMATIONS --- */
        header { 
            padding: 30px 10px; 
            text-align: center; 
            border-bottom: 2px solid rgba(212,175,55,0.3); 
            position: relative;
            background: rgba(0,0,0,0.5);
            display: flex;
            flex-direction: row; 
            justify-content: space-around; 
            align-items: center;
            gap: 10px;
            flex-wrap: nowrap; 
        }

        .logo-box { position: relative; flex-shrink: 0; width: 85px; height: 85px; }
        
        .main-logo { 
            position: relative; 
            width: 75px; 
            height: 75px; 
            border-radius: 50%; 
            border: 2px solid var(--gold); 
            box-shadow: 0 0 15px var(--gold); 
            cursor: pointer; 
            z-index: 10; 
            background: #000; 
        }

        .fire-motion { 
            position: absolute; 
            top: -5px; 
            left: -5px; 
            width: 85px; 
            height: 85px; 
            border-radius: 50%; 
            border: 3px solid var(--fire); 
            filter: blur(1px); 
            box-shadow: 0 0 15px var(--fire), inset 0 0 10px var(--fire); 
            animation: burn 3s linear infinite; 
            z-index: 5; 
        }
        
        @keyframes burn { 
            0% { transform: rotate(0deg) scale(1); opacity: 0.8; } 
            50% { transform: rotate(180deg) scale(1.1); opacity: 0.5; } 
            100% { transform: rotate(360deg) scale(1); opacity: 0.8; } 
        }

        .title-wrapper { position: relative; flex-grow: 1; max-width: 500px; display: flex; justify-content: center; }
        
        .royal-title-img { 
            width: 100%; 
            max-width: 500px; 
            filter: drop-shadow(0 0 10px var(--gold)); 
            animation: titlePulse 3s infinite ease-in-out; 
        }
        
        @keyframes titlePulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

        /* --- 4. USER STATUS PANEL --- */
        .user-panel { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 8px; 
            margin-top: 15px; 
            min-height: 40px; 
        }

        #welcome-user { 
            color: var(--gold); 
            font-weight: bold; 
            font-size: 17px; 
            font-family: 'Marcellus', serif; 
        }
        
        #loginBtn { 
            background: linear-gradient(45deg, #8a6d3b, #D4AF37, #f1d36d); 
            color: #000; 
            border: 1px solid #5c4013; 
            padding: 10px 30px; 
            border-radius: 30px; 
            font-weight: 800; 
            cursor: pointer; 
        }

        #logoutBtn { 
            background: rgba(20, 20, 20, 0.8); 
            color: #ff4444; 
            border: 1px solid #ff4444; 
            display: none; 
            padding: 8px 20px; 
            border-radius: 30px; 
            cursor: pointer; 
        }

        /* --- 5. BOTTOM NAVIGATION BAR --- */
        .bottom-nav { 
            position: sticky; 
            top: 0; 
            z-index: 2000; 
            width: 100%; 
            background: rgba(15, 12, 5, 0.95); 
            border-bottom: 2px solid var(--gold); 
            display: flex; 
            justify-content: space-around; 
            padding: 15px 0; 
            backdrop-filter: blur(10px); 
        }

        .nav-item { 
            color: #888; 
            font-size: 11px; 
            text-transform: uppercase; 
            font-weight: 800; 
            cursor: pointer; 
        }

        .nav-item.active { 
            color: var(--gold); 
            border-bottom: 2px solid var(--gold); 
        }

        /* --- 6. CONTENT & CHECKOUT AREA --- */
        .app-container { 
            max-width: 500px; 
            margin: 0 auto; 
            min-height: 65vh; 
            padding: 15px; 
            padding-bottom: 120px; 
        }

        #floatingCheckout { 
            position: fixed; 
            bottom: 0; 
            left: 0; 
            width: 100%; 
            background: #1a1a1a; 
            border-top: 2px solid #D4AF37; 
            padding: 15px; 
            display: none; 
            justify-content: space-between; 
            align-items: center; 
            z-index: 9999; 
            box-sizing: border-box;
        }

        #cancel-bar { 
            display: none; 
            background: rgba(0,0,0,0.9); 
            border: 1px solid var(--gold); 
            padding: 15px; 
            margin: 10px; 
            border-radius: 10px; 
            text-align: center;
            position: sticky;
            top: 70px;
            z-index: 3000;
        }

        /* --- 7. FLOATING SOCIALS & FOOTER --- */
        #royal-social-float { 
            position: fixed; 
            right: 20px; 
            bottom: 30px; 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            z-index: 9999; 
        }

        .social-icon { 
            width: 50px; 
            height: 50px; 
            background: var(--black); 
            border: 2px solid var(--gold); 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            box-shadow: 0 0 10px var(--gold-glow); 
            text-decoration: none; 
            transition: transform 0.3s; 
            animation: royalJump 3s infinite ease-in-out; 
        }

        .social-icon img { width: 28px; height: 28px; }

        @keyframes royalJump { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        .footer-section { text-align: center; padding: 50px 20px; background: linear-gradient(to bottom, #1a1a1a, #2a0a0a); border-top: 3px solid var(--gold); margin-top: 30px; }

        /* --- 8. SIDE DRAWER SYSTEM --- */
        #side-drawer { 
            position: fixed; 
            top: 0; 
            right: -280px; 
            width: 260px; 
            height: 100%; 
            background: rgba(10, 10, 10, 0.98); 
            border-left: 2px solid var(--gold); 
            z-index: 5000; 
            transition: 0.4s ease-in-out; 
            padding: 30px 20px; 
            box-shadow: -10px 0 30px rgba(0,0,0,0.8); 
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
        }

        #side-drawer.open { right: 0; }

        .drawer-item { 
            color: #fff; 
            font-family: 'Marcellus', serif; 
            font-size: 18px; 
            padding: 15px; 
            border-bottom: 1px solid rgba(212, 175, 55, 0.2); 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            gap: 15px; 
        }

        #drawer-overlay { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(0,0,0,0.7); 
            display: none; 
            z-index: 4500; 
            backdrop-filter: blur(5px); 
        }

    <script>
        /**
         * 1. GLOBAL INITIALIZATION
         */
        window.cart = JSON.parse(localStorage.getItem('userCart')) || []; 
        let cancelInterval;
        const bridgeUrl = 'https://script.google.com/macros/s/AKfycbzW74ZcMwYcbBsXa9YTExua--mx-AiY5dLmZsde9Qqpikrtkp_8OU8rjeJhy-FQiBM/exec';

        /**
         * 2. SHAHI TAB ENGINE
         */
 function showTab(tabId) {
    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
    const activeBtn = document.getElementById('btn-' + tabId);
    if(activeBtn) activeBtn.classList.add('active');
    
    const contentArea = document.getElementById('content-area');
    contentArea.innerHTML = "<div style='text-align:center; padding:50px; color:var(--gold);'>👑 Loading...</div>";
    
    fetch('./' + tabId + '-tab.html?v=' + Date.now())
    .then(res => res.text())
    .then(data => {
        contentArea.innerHTML = data;
        updateUserUI();
        
        // 🔥 ERROR PROOF SCRIPT INJECTION
        const scripts = contentArea.querySelectorAll('script');
        scripts.forEach(oldScript => {
            const newScript = document.createElement('script');
            // Saare attributes copy karo
            Array.from(oldScript.attributes).forEach(attr => {
                newScript.setAttribute(attr.name, attr.value);
            });
            
            // Text assign karo (textContent is safer for parsing)
            newScript.textContent = oldScript.textContent;
            
            // Purane script ko replace karo
            try {
                oldScript.parentNode.replaceChild(newScript, oldScript);
            } catch (scriptErr) {
                console.error("Script Execution Failed for:", tabId, scriptErr);
            }
        });
    })
    .catch(err => { 
        console.error("Tab Load Error:", err);
        contentArea.innerHTML = "<div style='text-align:center; padding:50px;'>Welcome!</div>"; 
    });

    if(tabId !== 'admin') localStorage.setItem('activeTab', tabId);
    window.scrollTo({top: 0, behavior: 'smooth'});
}

        /**
         * 3. USER INTERFACE UPDATER
         */
        function updateUserUI() {
            const userName = localStorage.getItem('userName');
            const welcomeSpan = document.getElementById('welcome-user');
            
            if(welcomeSpan) {
                welcomeSpan.innerHTML = userName ? "Namaste, " + userName + "! ✨" : "";
            }
            
            document.getElementById('loginBtn').style.display = userName ? 'none' : 'inline-block';
            document.getElementById('logoutBtn').style.display = userName ? 'inline-block' : 'none';
            
            const trackBtn = document.getElementById('trackBtn');
            if(trackBtn) trackBtn.style.display = userName ? 'inline-block' : 'none';
        }

        /**
         * 🛡️ 4. THE ROYAL GATEKEEPER CHECKOUT
         * Performs a live audit of stock before token generation
         */
        window.checkout = async function() {
            // Validation
            const user = window.auth ? window.auth.currentUser : null;
            if(!user && !localStorage.getItem('userName')) { 
                alert("Namaste! Order karne ke liye pehle login karein."); 
                return window.registerUser(); 
            }

            const uName = localStorage.getItem('userName');
            const uPhone = localStorage.getItem('userPhone');

            if(!uPhone || uPhone === "null") {
                alert("Profile adhura hai! Dashboard mein WhatsApp number update karein.");
                return showTab('dashboard');
            }

            if(window.cart.length === 0) return alert("Aapki cart khali hai!");

            const btn = document.getElementById('orderNowBtn');
            const originalText = btn.innerText;
            btn.innerText = "SHAHI AUDIT... 🛡️";
            btn.disabled = true;

            try {
                // --- GATEKEEPER START ---
                const invRes = await fetch(bridgeUrl + "?action=getInventory");
                const latestStock = await invRes.json();
                let outItems = [];

                window.cart.forEach(item => {
                    // Normalize name to handle variations like (H) or (F)
                    let cleanDishName = item.name.split(' (')[0].trim(); 
                    if (latestStock[cleanDishName] === "Out" || latestStock[item.name] === "Out") {
                        outItems.push(item.name);
                    }
                });

                if (outItems.length > 0) {
                    alert(`🛑 MAAF KIJIYE!\n\nYe items khatam ho gaye hain:\n- ${outItems.join('\n- ')}\n\nHumne inhe hata diya hai. Kripya baki order proceed karein.`);
                    window.cart = window.cart.filter(i => !outItems.includes(i.name));
                    updateCartUI();
                    btn.innerText = originalText; btn.disabled = false;
                    return; // KILL FLOW
                }

                // --- PROCEED TO TOKEN ---
                btn.innerText = "BOOKING ORDER... 👑";
                const tokenRes = await fetch(bridgeUrl);
                const nextToken = await tokenRes.text(); 
                
                let total = window.cart.reduce((s, i) => s + (i.price * i.qty), 0);
                let itemsStr = window.cart.map(i => `${i.name} x${i.qty}`).join(', ');

                // Final Data Post
                const finalUrl = bridgeUrl + 
                    "?token=" + encodeURIComponent(nextToken) + 
                    "&name=" + encodeURIComponent(uName) + 
                    "&phone=" + encodeURIComponent(uPhone) + 
                    "&items=" + encodeURIComponent(itemsStr) + 
                    "&total=" + total + 
                    "&status=Awaiting%20Payment";

                await fetch(finalUrl, { method: 'POST', mode: 'no-cors' });

                // SUCCESS HANDLERS
                localStorage.setItem('lastTokenNo', nextToken);
                
                // WhatsApp Notify
                let waMsg = `*ROYAL STREET KITCHEN* 👑%0A---------------------%0A*Token:* %23${nextToken}%0A*Order:* ${itemsStr}%0A*Total: ₹${total}*`;
                window.open(`https://wa.me/917489999890?text=${waMsg}`, '_blank');

                alert("Waah! Order place ho gaya hai. Token #" + nextToken);
                
                window.cart = []; 
                updateCartUI();
                showTab('dashboard'); 
                startCancelTimer(300, true);

            } catch (err) {
                console.error("Checkout Error:", err);
                alert("Technical Issue! Order place nahi hua.");
            } finally {
                btn.innerText = originalText; 
                btn.disabled = false;
            }
        };

        /**
         * 5. TIMER & BACKGROUND SYNC
         */
        function startCancelTimer(duration, isNew = false) {
            clearInterval(cancelInterval);
            const display = document.getElementById('timer-display');
            const bar = document.getElementById('cancel-bar');
            const tokenSpan = document.getElementById('last-token');
            
            let startTime = isNew ? Date.now() : parseInt(localStorage.getItem('timerStartTime'));
            if (isNew) localStorage.setItem('timerStartTime', startTime);

            const token = localStorage.getItem('lastTokenNo');
            if(!token || !startTime) return;

            tokenSpan.innerText = token;
            bar.style.display = 'block';

            cancelInterval = setInterval(async function () {
                let rem = duration - Math.floor((Date.now() - startTime) / 1000);

                // Auto-sync status every 15 seconds
                if (rem % 15 === 0 && rem > 0) {
                    try {
                        const res = await fetch(bridgeUrl + "?action=readAdmin");
                        const orders = await res.json();
                        const my = orders.find(o => o.token === token);
                        // If admin accepted, hide cancel bar
                        if (my && !["awaiting payment", "pending", ""].includes(my.status.toLowerCase())) {
                            clearInterval(cancelInterval);
                            bar.style.display = 'none'; return;
                        }
                    } catch(e) {}
                }

                if (rem <= 0) {
                    clearInterval(cancelInterval);
                    bar.style.display = 'none';
                    localStorage.removeItem('lastTokenNo'); 
                    localStorage.removeItem('timerStartTime');
                } else {
                    let m = Math.floor(rem / 60), s = rem % 60;
                    display.textContent = `${m < 10 ? '0'+m : m}:${s < 10 ? '0'+s : s}`;
                }
            }, 1000);
        }

        /**
         * 6. ORDER CANCELLATION HANDLER
         */
        window.cancelOrder = function() {
            const token = localStorage.getItem('lastTokenNo');
            const name = localStorage.getItem('userName');
            if(!token || !confirm("Order cancel karein?")) return;

            // Send Cancel Command
            fetch(bridgeUrl, { 
                method: 'POST', 
                mode: 'no-cors', 
                body: new URLSearchParams({token, name, status: 'Cancelled By User'}).toString() 
            });

            window.open(`https://wa.me/917489999890?text=*CANCELLED* ❌%0A*Token:* ${encodeURIComponent(token)}`, '_blank');
            
            clearInterval(cancelInterval);
            document.getElementById('cancel-bar').style.display = 'none';
            localStorage.removeItem('lastTokenNo');
            localStorage.removeItem('timerStartTime');
            alert("Order Cancelled!");
        };

        /**
         * 7. CART SYSTEM LOGIC
         */
        window.addToCart = function(name, price) {
            if(!localStorage.getItem('userName')) return window.registerUser();
            const ex = window.cart.find(i => i.name === name);
            if (ex) { ex.qty += 1; } else { window.cart.push({ name, price, qty: 1 }); }
            updateCartUI();
        };

        window.removeFromCart = function(name) {
            const idx = window.cart.findIndex(i => i.name === name);
            if (idx > -1) { 
                if (window.cart[idx].qty > 1) { 
                    window.cart[idx].qty -= 1; 
                } else { 
                    window.cart.splice(idx, 1); 
                } 
            }
            updateCartUI();
        };

        function updateCartUI() {
            const bar = document.getElementById('floatingCheckout');
            const list = document.getElementById('cart-items-list');
            const totalDisp = document.getElementById('cart-total-display');
            const social = document.getElementById('royal-social-float');
            
            let total = window.cart.reduce((s, i) => s + (i.price * i.qty), 0);
            
            if (window.cart.length > 0) {
                bar.style.display = 'flex'; 
                totalDisp.innerText = total;
                list.innerHTML = window.cart.map(i => `
                    <div style="display:flex;justify-content:space-between;font-size:10px;margin-bottom:4px;align-items:center;">
                        <span>${i.name} x${i.qty}</span>
                        <button onclick="window.removeFromCart('${i.name}')" 
                                style="background:rgba(255,0,0,0.1); border:1px solid red; color:red; padding:1px 6px; border-radius:50%; font-weight:bold;">
                            -
                        </button>
                    </div>`).join('');
                if(social) social.style.display = 'none';
            } else {
                bar.style.display = 'none'; 
                if(social) social.style.display = 'flex';
            }
            localStorage.setItem('userCart', JSON.stringify(window.cart));
        }

        /**
         * 8. ADMIN ACCESS & UTILS
         */
        window.handleAdminAccess = function() {
            window.cCount = (window.cCount || 0) + 1;
            setTimeout(() => window.cCount = 0, 3000);
            if (window.cCount === 3) {
                let pass = prompt("🔐 Enter Royal Admin Key:");
                if (pass === "RSK@2026") { 
                    localStorage.setItem('isAdminLoggedIn', 'true');
                    showTab('admin'); 
                }
            }
        };

        function toggleSideMenu() {
            const d = document.getElementById('side-drawer');
            const o = document.getElementById('drawer-overlay');
            d.classList.toggle('open');
            if(o) o.style.display = d.classList.contains('open') ? 'block' : 'none';
        }

        window.onload = () => { 
            let tab = localStorage.getItem('isAdminLoggedIn') === 'true' ? 'admin' : (localStorage.getItem('activeTab') || 'home');
            showTab(tab); updateUserUI(); 
            if(localStorage.getItem('lastTokenNo')) startCancelTimer(300, false);
        };
    </script>

            projectId: "rsk-test-63cee", 
            storageBucket: "rsk-test-63cee.firebasestorage.app", 
            messagingSenderId: "805798855186", 
            appId: "1:805798855186:web:9b0d09decca344a9478ecb" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        window.auth = auth;

        window.registerUser = async function() {
            try {
                const res = await signInWithPopup(auth, new GoogleAuthProvider());
                const user = res.user;
                const uDoc = await getDoc(doc(db, "users", user.uid));
                
                if (!uDoc.exists()) {
                    let phone = prompt("Namaste! Aapka WhatsApp number kya hai?");
                    if(phone && phone.length >= 10) {
                        await setDoc(doc(db, "users", user.uid), { 
                            name: user.displayName, 
                            email: user.email, 
                            phone: phone, 
                            joinedAt: serverTimestamp() 
                        });
                        localStorage.setItem('userName', user.displayName); 
                        localStorage.setItem('userPhone', phone);
                    }
                } else {
                    const data = uDoc.data();
                    localStorage.setItem('userName', data.name); 
                    localStorage.setItem('userPhone', data.phone);
                }
                location.reload();
            } catch (e) { alert("Login failure: " + e.message); }
        };

        window.logout = async () => { 
            if(confirm("Royal Account se Logout karein?")) { 
                await signOut(auth); 
                localStorage.clear(); 
                location.reload(); 
            } 
        };
    </script>
</body>
</html>
