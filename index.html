<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Royal Street Kitchen | RSK Indore</title>

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-NQGXYF0TMG"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', 'G-NQGXYF0TMG');
    </script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>    
    
    <link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --gold: #D4AF37; 
            --black: #0a0a0a; 
            --royal-red: #3a0d0d; 
            --gold-glow: rgba(212, 175, 55, 0.6); 
            --fire: #ff4500;
        }

        body { 
            margin: 0; background: var(--black); 
            background-image: radial-gradient(circle at center, var(--royal-red) 0%, var(--black) 100%); 
            color: #fff; font-family: 'Poppins', sans-serif; overflow-x: hidden; 
        }

        /* --- HEADER SECTION --- */
        header { 
            padding: 30px 10px; text-align: center; border-bottom: 2px solid rgba(212, 175, 55, 0.3); 
            position: relative; background: rgba(0, 0, 0, 0.5);
            display: flex; flex-direction: row; justify-content: space-around; align-items: center; gap: 10px;
        }

        .logo-box { position: relative; flex-shrink: 0; width: 85px; height: 85px; }
        .main-logo { 
            position: relative; width: 75px; height: 75px; border-radius: 50%; 
            border: 2px solid var(--gold); box-shadow: 0 0 15px var(--gold); cursor: pointer; z-index: 10; background: #000; 
        }
        
        .fire-motion { 
            position: absolute; top: -5px; left: -5px; width: 85px; height: 85px; border-radius: 50%; 
            border: 3px solid var(--fire); filter: blur(1px); box-shadow: 0 0 15px var(--fire); animation: burn 3s linear infinite; z-index: 5; 
        }
        
        @keyframes burn { 0% { transform: rotate(0deg) scale(1); } 50% { transform: rotate(180deg) scale(1.1); } 100% { transform: rotate(360deg) scale(1); } }

        .royal-title-img { width: 100%; max-width: 500px; filter: drop-shadow(0 0 10px var(--gold)); animation: titlePulse 3s infinite ease-in-out; }
        @keyframes titlePulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

        /* --- UI PANELS --- */
        .user-panel { display: flex; flex-direction: column; align-items: center; gap: 8px; margin-top: 15px; min-height: 40px; }
        #welcome-user { color: var(--gold); font-weight: bold; font-size: 17px; font-family: 'Marcellus', serif; }
        #loginBtn { background: linear-gradient(45deg, #8a6d3b, #D4AF37, #f1d36d); color: #000; border: 1px solid #5c4013; padding: 10px 30px; border-radius: 30px; font-weight: 800; cursor: pointer; }
        #logoutBtn { background: rgba(20, 20, 20, 0.8); color: #ff4444; border: 1px solid #ff4444; display: none; padding: 8px 20px; border-radius: 30px; cursor: pointer; }

        .bottom-nav { position: sticky; top: 0; z-index: 2000; width: 100%; background: rgba(15, 12, 5, 0.95); border-bottom: 2px solid var(--gold); display: flex; justify-content: space-around; padding: 15px 0; backdrop-filter: blur(10px); }
        .nav-item { color: #888; font-size: 11px; text-transform: uppercase; font-weight: 800; cursor: pointer; }
        .nav-item.active { color: var(--gold); border-bottom: 2px solid var(--gold); }

        .app-container { max-width: 500px; margin: 0 auto; min-height: 65vh; padding: 15px; padding-bottom: 120px; }

        /* --- FLOATING ELEMENTS --- */
        #floatingCheckout { position: fixed; bottom: 0; left: 0; width: 100%; background: #1a1a1a; border-top: 2px solid #D4AF37; padding: 15px; display: none; justify-content: space-between; align-items: center; z-index: 9999; box-sizing: border-box; }
        #cancel-bar { display: none; background: rgba(0,0,0,0.9); border: 2px solid var(--gold); padding: 15px; margin: 10px; border-radius: 10px; text-align: center; position: sticky; top: 70px; z-index: 3000; }

        #royal-social-float { position: fixed; right: 20px; bottom: 30px; display: flex; flex-direction: column; gap: 12px; z-index: 9999; }
        .social-icon { width: 50px; height: 50px; background: var(--black); border: 2px solid var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; animation: royalJump 3s infinite ease-in-out; }
        @keyframes royalJump { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        #side-drawer { position: fixed; top: 0; right: -280px; width: 260px; height: 100%; background: rgba(10, 10, 10, 0.98); border-left: 2px solid var(--gold); z-index: 5000; transition: 0.4s; padding: 30px 20px; }
        #side-drawer.open { right: 0; }
        #drawer-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; z-index: 4500; backdrop-filter: blur(5px); }
    </style>
</head>
<body>

    <header>
        <div class="logo-box">
            <div class="fire-motion"></div>
            <img src="MAIN_LOGO.jpeg" class="main-logo" onclick="handleAdminAccess()">
        </div>
        <div class="title-wrapper"><img src="royalstreetkitchen.png" class="royal-title-img"></div>
        <div style="width:100px;"><img src="vectoriloveindore.png" style="width:160%;"></div>
    </header>

    <div class="user-panel">
        <span id="welcome-user"></span>
        <button onclick="window.registerUser()" id="loginBtn">👑 Login / Register 👑</button>
        <button onclick="window.logout()" id="logoutBtn">Logout Account</button>
        <button id="trackBtn" onclick="showTab('dashboard')" style="display:none; background:var(--gold); color:black; border:none; padding:10px 20px; border-radius:30px; font-weight:bold; margin-top:5px;">Track Order 📍</button>
    </div>

    <div class="bottom-nav">
        <div class="nav-item" id="btn-home" onclick="showTab('home')">Home</div>
        <div class="nav-item" id="btn-menu" onclick="showTab('menu')">Menu</div>
        <div class="nav-item" id="btn-safar" onclick="showTab('safar')">Safar</div>
        <div class="nav-item" id="btn-reach" onclick="showTab('reach')">Reach</div>
        <div class="nav-item" id="btn-feedback" onclick="showTab('feedback')">Feedback</div>
        <div class="nav-item" onclick="toggleSideMenu()" style="color: var(--gold); font-size: 18px;">☰</div>
    </div>

    <div id="cancel-bar">
        <div style="font-size: 12px; color: #fff;">🕒 <b>Active Order: Token #<span id="last-token">00</span></b><br>Cancel window: <span id="timer-display" style="color: #ff4444; font-weight: bold;">05:00</span></div>
        <button onclick="window.cancelOrder()" style="background:#ff4444; color:white; border:none; padding:8px 15px; border-radius:5px; margin-top:8px; cursor:pointer; font-weight:bold;">Urgent Cancel ❌</button>
    </div>

    <div class="app-container" id="content-area"></div>

    <div id="floatingCheckout">
        <div style="flex: 1; padding-right: 10px;">
            <div id="cart-items-list" style="font-size: 11px; color: #fff; margin-bottom: 8px; max-height: 80px; overflow-y: auto;"></div>
            <div style="font-size: 20px; font-weight: bold; color: #D4AF37;">₹<span id="cart-total-display">0</span></div>
        </div>
        <button onclick="window.checkout()" id="orderNowBtn" style="background: #25D366; color: #fff; border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; cursor: pointer;">Order Now</button>
    </div>

    <div id="royal-social-float">
        <a href="https://wa.me/917489999890" class="social-icon" target="_blank"><img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" width="28"></a>
        <a href="https://www.facebook.com/ROYALSTREETKITCHENRSKINDORE" class="social-icon" target="_blank"><img src="https://cdn-icons-png.flaticon.com/512/733/733547.png" width="28"></a>
        <a href="https://www.instagram.com/royalstreetkitchenrskindore/" class="social-icon" target="_blank"><img src="https://cdn-icons-png.flaticon.com/512/174/174855.png" width="28"></a>
    </div>

    <div id="drawer-overlay" onclick="toggleSideMenu()"></div>
    <div id="side-drawer">
        <div style="text-align: center; margin-bottom: 20px;"><img src="royalstreetkitchen.png" style="width: 120px;"><p style="color: var(--gold); font-size: 10px;">SHAHI PITARA</p></div>
        <div class="drawer-item" onclick="showTab('gallery'); toggleSideMenu()">📸 Shahi Jhalak</div>
        <div class="drawer-item" onclick="showTab('offers'); toggleSideMenu()">🎁 Shahi Saugat</div>
        <div style="margin-top: auto; text-align: center; font-size: 10px; color: #555;">V 2.7 • ROYAL STREET KITCHEN</div>
    </div>

    <script>
        /**
         * 1. CORE TAB SYSTEM
         */
        window.cart = JSON.parse(localStorage.getItem('userCart')) || []; 
        let cancelInterval;
        const bridgeUrl = 'https://script.google.com/macros/s/AKfycbzW74ZcMwYcbBsXa9YTExua--mx-AiY5dLmZsde9Qqpikrtkp_8OU8rjeJhy-FQiBM/exec';

        function showTab(tabId) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            if(document.getElementById('btn-' + tabId)) document.getElementById('btn-' + tabId).classList.add('active');
            
            const contentArea = document.getElementById('content-area');
            contentArea.innerHTML = "<div style='text-align:center; padding:50px; color:var(--gold);'>👑 Loading Shahi Section...</div>";
            
            fetch('./' + tabId + '-tab.html?v=' + Date.now())
            .then(res => res.text())
            .then(data => {
                contentArea.innerHTML = data;
                updateUserUI();
                
                // Script Loading - Fixed (No Extra Brackets)
                const scripts = contentArea.querySelectorAll('script');
                scripts.forEach(oldScript => {
                    const newScript = document.createElement('script');
                    Array.from(oldScript.attributes).forEach(attr => newScript.setAttribute(attr.name, attr.value));
                    newScript.textContent = oldScript.textContent; 
                    oldScript.parentNode.replaceChild(newScript, oldScript);
                });
            })
            .catch(err => { 
                console.error(err);
                contentArea.innerHTML = "<div style='text-align:center; padding:50px;'>Namaste!</div>"; 
            });

            if(tabId !== 'admin') localStorage.setItem('activeTab', tabId);
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function updateUserUI() {
            const userName = localStorage.getItem('userName');
            const welcomeSpan = document.getElementById('welcome-user');
            if(welcomeSpan) {
                welcomeSpan.innerHTML = userName ? "Namaste, " + userName + "! ✨" : "";
            }
            document.getElementById('loginBtn').style.display = userName ? 'none' : 'inline-block';
            document.getElementById('logoutBtn').style.display = userName ? 'inline-block' : 'none';
            const trackBtn = document.getElementById('trackBtn');
            if(trackBtn) trackBtn.style.display = userName ? 'inline-block' : 'none';
        }

        /**
         * 🛡️ 2. THE ROYAL GATEKEEPER CHECKOUT
         */
        window.checkout = async function() {
            if(!localStorage.getItem('userName')) { alert("Pehle Login Karein!"); return window.registerUser(); }
            const uPhone = localStorage.getItem('userPhone');
            if(!uPhone || uPhone === "null") { alert("Number missing! Dashboard mein update karein."); return showTab('dashboard'); }
            if(window.cart.length === 0) return alert("Cart khali hai!");

            const btn = document.getElementById('orderNowBtn');
            btn.innerText = "SHAHI AUDIT... 🛡️"; btn.disabled = true;

            try {
                // Stock Check
                const invRes = await fetch(bridgeUrl + "?action=getInventory");
                const stock = await invRes.json();
                let outItems = [];

                window.cart.forEach(item => {
                    let cleanName = item.name.split(' (')[0].trim(); 
                    if (stock[cleanName] === "Out" || stock[item.name] === "Out") {
                        outItems.push(item.name);
                    }
                });

                if (outItems.length > 0) {
                    alert(`🛑 MAAF KIJIYE!\n\nYe items khatam ho gaye hain:\n- ${outItems.join('\n- ')}`);
                    window.cart = window.cart.filter(i => !outItems.includes(i.name));
                    updateCartUI();
                    btn.innerText = "Order Now"; btn.disabled = false;
                    return; 
                }

                // Token Gen
                btn.innerText = "BOOKING... 👑";
                const tRes = await fetch(bridgeUrl);
                const token = await tRes.text(); 
                
                let total = window.cart.reduce((s, i) => s + (i.price * i.qty), 0);
                let itemsStr = window.cart.map(i => `${i.name} x${i.qty}`).join(', ');

                const finalUrl = bridgeUrl + "?token=" + encodeURIComponent(token) + "&name=" + encodeURIComponent(localStorage.getItem('userName')) + "&phone=" + encodeURIComponent(uPhone) + "&items=" + encodeURIComponent(itemsStr) + "&total=" + total + "&status=Awaiting%20Payment";

                await fetch(finalUrl, { method: 'POST', mode: 'no-cors' });

                localStorage.setItem('lastTokenNo', token);
                window.open(`https://wa.me/917489999890?text=*ROYAL STREET KITCHEN* 👑%0A*Token:* %23${token}%0A*Order:* ${itemsStr}%0A*Total: ₹${total}*`, '_blank');

                alert("Order Placed! Token #" + token);
                window.cart = []; updateCartUI();
                showTab('dashboard'); startCancelTimer(300, true);

            } catch (err) {
                alert("Technical Error! Try again.");
            } finally {
                btn.innerText = "Order Now"; btn.disabled = false;
            }
        };

        /**
         * 3. TIMER & CANCEL
         */
        function startCancelTimer(duration, isNew = false) {
            clearInterval(cancelInterval);
            let start = isNew ? Date.now() : parseInt(localStorage.getItem('timerStartTime'));
            if (isNew) localStorage.setItem('timerStartTime', start);
            const token = localStorage.getItem('lastTokenNo');
            if(!token || !start) return;

            document.getElementById('last-token').innerText = token;
            document.getElementById('cancel-bar').style.display = 'block';

            cancelInterval = setInterval(async function () {
                let rem = duration - Math.floor((Date.now() - start) / 1000);
                if (rem % 15 === 0) {
                    try {
                        const res = await fetch(bridgeUrl + "?action=readAdmin");
                        const d = await res.json();
                        const my = d.find(o => o.token === token);
                        if (my && !["awaiting payment", "pending", ""].includes(my.status.toLowerCase())) {
                            stopAndHideTimer(); return;
                        }
                    } catch(e) {}
                }
                if (rem <= 0) { stopAndHideTimer(); } 
                else {
                    let m = Math.floor(rem / 60), s = rem % 60;
                    document.getElementById('timer-display').textContent = `${m < 10 ? '0'+m : m}:${s < 10 ? '0'+s : s}`;
                }
            }, 1000);
        }

        function stopAndHideTimer() {
            clearInterval(cancelInterval);
            if(document.getElementById('cancel-bar')) document.getElementById('cancel-bar').style.display = 'none';
            localStorage.removeItem('lastTokenNo'); localStorage.removeItem('timerStartTime');
        }

        window.cancelOrder = function() {
            const token = localStorage.getItem('lastTokenNo'), name = localStorage.getItem('userName');
            if(!token || !confirm("Order cancel karein?")) return;
            fetch(bridgeUrl, { method: 'POST', mode: 'no-cors', body: new URLSearchParams({token, name, status: 'Cancelled By User'}).toString() });
            window.open(`https://wa.me/917489999890?text=*CANCELLED* ❌%0A*Token:* ${encodeURIComponent(token)}`, '_blank');
            stopAndHideTimer(); alert("Cancelled!");
        };

        /**
         * 4. CART ENGINE
         */
        window.addToCart = function(name, price) {
            if(!localStorage.getItem('userName')) return window.registerUser();
            const ex = window.cart.find(i => i.name === name);
            if (ex) { ex.qty += 1; } else { window.cart.push({ name, price, qty: 1 }); }
            updateCartUI();
        };

        window.removeFromCart = function(name) {
            const idx = window.cart.findIndex(i => i.name === name);
            if (idx > -1) { if (window.cart[idx].qty > 1) { window.cart[idx].qty -= 1; } else { window.cart.splice(idx, 1); } }
            updateCartUI();
        };

        function updateCartUI() {
            const bar = document.getElementById('floatingCheckout');
            const totalDisp = document.getElementById('cart-total-display');
            let total = window.cart.reduce((s, i) => s + (i.price * i.qty), 0);
            if (window.cart.length > 0) {
                bar.style.display = 'flex'; totalDisp.innerText = total;
                document.getElementById('cart-items-list').innerHTML = window.cart.map(i => `<div style="display:flex;justify-content:space-between;font-size:10px;margin-bottom:4px;"><span>${i.name} x${i.qty}</span><button onclick="window.removeFromCart('${i.name}')" style="color:red;border:none;background:none;">-</button></div>`).join('');
                document.getElementById('royal-social-float').style.display = 'none';
            } else {
                bar.style.display = 'none'; document.getElementById('royal-social-float').style.display = 'flex';
            }
            localStorage.setItem('userCart', JSON.stringify(window.cart));
        }

        /**
         * 5. ADMIN UTILS
         */
        window.handleAdminAccess = function() {
            window.c = (window.c || 0) + 1;
            setTimeout(() => window.c = 0, 3000);
            if (window.c === 3) {
                if (prompt("Key:") === "RSK@2026") { localStorage.setItem('isAdminLoggedIn', 'true'); showTab('admin'); }
            }
        };

        function toggleSideMenu() {
            document.getElementById('side-drawer').classList.toggle('open');
            document.getElementById('drawer-overlay').style.display = document.getElementById('side-drawer').classList.contains('open') ? 'block' : 'none';
        }

        window.onload = () => { 
            let tab = localStorage.getItem('isAdminLoggedIn') === 'true' ? 'admin' : (localStorage.getItem('activeTab') || 'home');
            showTab(tab); updateUserUI(); 
            if(localStorage.getItem('lastTokenNo')) startCancelTimer(300, false);
        };
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const fc = { apiKey: "AIzaSyDGbHAorUN14LmXtRCd1IYzKQzP8hP02AE", authDomain: "rsk-test-63cee.firebaseapp.com", projectId: "rsk-test-63cee", storageBucket: "rsk-test-63cee.firebasestorage.app", messagingSenderId: "805798855186", appId: "1:805798855186:web:9b0d09decca344a9478ecb" };
        const app = initializeApp(fc), db = getFirestore(app), auth = getAuth(app);
        window.auth = auth;

        window.registerUser = async () => {
            try {
                const res = await signInWithPopup(auth, new GoogleAuthProvider());
                const user = res.user;
                const uDoc = await getDoc(doc(db, "users", user.uid));
                if (!uDoc.exists()) {
                    let p = prompt("WhatsApp Number?");
                    if(p && p.length >= 10) {
                        await setDoc(doc(db, "users", user.uid), { name: user.displayName, email: user.email, phone: p, joinedAt: serverTimestamp() });
                        localStorage.setItem('userName', user.displayName); localStorage.setItem('userPhone', p);
                    }
                } else {
                    localStorage.setItem('userName', uDoc.data().name); localStorage.setItem('userPhone', uDoc.data().phone);
                }
                location.reload();
            } catch (e) { alert("Auth failed!"); }
        };

        window.logout = async () => { if(confirm("Logout?")) { await signOut(auth); localStorage.clear(); location.reload(); } };
    </script>
</body>
</html>
