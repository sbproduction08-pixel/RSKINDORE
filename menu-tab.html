<div id="dynamic-menu-render" style="background: #000; padding: 15px; min-height: 400px;">
    </div>

<div id="cart-footer" style="position: fixed; bottom: 0; left: 0; width: 100%; background: #1a1a1a; border-top: 2px solid #D4AF37; padding: 15px; display: none; z-index: 9999; box-shadow: 0 -5px 15px rgba(0,0,0,0.5);">
    <div style="max-width: 600px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center;">
        <div style="color: #fff;">
            <div id="cart-count" style="font-size: 12px; color: #D4AF37;">0 Items</div>
            <div style="font-size: 18px; font-weight: bold;">Total: ₹<span id="cart-total">0</span></div>
        </div>
        <button onclick="sendToWhatsApp()" style="background: #25D366; color: white; border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; cursor: pointer;">
            Order on WhatsApp
        </button>
    </div>
</div>
<script>
// --- CONFIGURATION ---
const RSK_PHONE = "91XXXXXXXXXX"; // Apna WhatsApp number yahan likhein

const menuData = [
    {
        sectionName: "👑 RSK ROYAL COMBOS",
        sectionPhoto: "ROYAL COMBO.jpg",
        items: [
            { name: "Tawa Chicken + Paratha", price: 259, type: "single" },
            { name: "Paneer Bhurji + Kulcha", price: 199, type: "single" }
        ]
    },
    {
        sectionName: "🍢 ROYAL STARTERS",
        sectionPhoto: "STARTERS_BANNER.jpg",
        items: [
            { name: "Chicken Seekh Kebab", price: 179, type: "single" },
            { name: "Veg Spring Roll", price: 120, type: "single" },
            { name: "Crispy Corn", price: 130, type: "single" }
        ]
    },
    {
        sectionName: "🍗 NON-VEG SPECIALS",
        sectionPhoto: "NON_VEG_BANNER.jpg",
        items: [
            { name: "RSK Special Chicken", halfPrice: 219, fullPrice: 399, type: "dual" },
            { name: "Chicken Masala", halfPrice: 180, fullPrice: 320, type: "dual" },
            { name: "Chicken Keema Paratha", price: 149, type: "single" }
        ]
    },
    {
        sectionName: "🍛 MAIN COURSE (VEG)",
        sectionPhoto: "VEG_MAIN_BANNER.jpg",
        items: [
            { name: "Paneer Butter Masala", price: 240, type: "single" },
            { name: "Dal Makhani Royal", price: 220, type: "single" },
            { name: "Mix Veg", price: 180, type: "single" }
        ]
    },
    {
        sectionName: "🍜 MAGGIE & SNACKS",
        sectionPhoto: "MAGGIE_BANNER.jpg",
        items: [
            { name: "RSK Special Maggie", price: 99, type: "single" },
            { name: "Egg Maggie", price: 119, type: "single" },
            { name: "Veg Cheese Maggie", price: 110, type: "single" }
        ]
    },
    {
        sectionName: "🫓 ROYAL BREADS",
        sectionPhoto: "BREADS_BANNER.jpg",
        items: [
            { name: "Butter Naan", price: 40, type: "single" },
            { name: "Lachha Paratha", price: 50, type: "single" },
            { name: "Rumali Roti", price: 15, type: "single" }
        ]
    },
    {
        sectionName: "🥤 DRINKS & DESSERTS",
        sectionPhoto: "DRINKS_BANNER.jpg",
        items: [
            { name: "Cold Coffee", price: 99, type: "single" },
            { name: "Masala Tea", price: 30, type: "single" },
            { name: "Gulab Jamun (2pc)", price: 60, type: "single" }
        ]
    }
];

let cart = [];

// --- FUNCTIONS ---

function renderMenu() {
    const container = document.getElementById('dynamic-menu-render');
    if(!container) return;

    let html = "";
    menuData.forEach(section => {
        html += `
        <div style="margin-bottom:30px;">
            <img src="${section.sectionPhoto}" style="width:100%; border-radius:12px; margin-bottom:15px;" onerror="this.style.display='none'">
            <div style="color:#D4AF37; font-weight:bold; border-left:4px solid #D4AF37; padding-left:12px; margin-bottom:15px; text-transform:uppercase;">${section.sectionName}</div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
        `;
        
        section.items.forEach(item => {
            html += `
            <div style="background:rgba(255,255,255,0.05); border:1px solid #333; border-radius:12px; padding:12px; display:flex; flex-direction:column; justify-content:space-between;">
                <div style="color:#fff; font-size:13px; margin-bottom:8px;">${item.name}</div>
                ${item.type === 'single' ? `
                    <div style="color:#D4AF37; font-weight:bold; margin-bottom:8px;">₹${item.price}</div>
                    <button onclick="addToCart('${item.name}', ${item.price})" style="background:#D4AF37; color:#000; border:none; padding:10px; border-radius:6px; font-weight:800; cursor:pointer;">+ ADD</button>
                ` : `
                    <div style="color:#D4AF37; font-size:11px; margin-bottom:8px;">H: ₹${item.halfPrice} | F: ₹${item.fullPrice}</div>
                    <div style="display:flex; gap:4px;">
                        <button onclick="addToCart('${item.name} (H)', ${item.halfPrice})" style="background:#f0f0f0; border:none; padding:8px 4px; border-radius:6px; font-weight:700; cursor:pointer; flex:1; font-size:10px;">HALF</button>
                        <button onclick="addToCart('${item.name} (F)', ${item.fullPrice})" style="background:#D4AF37; border:none; padding:8px 4px; border-radius:6px; font-weight:700; cursor:pointer; flex:1; font-size:10px;">FULL</button>
                    </div>
                `}
            </div>`;
        });
        html += `</div></div>`;
    });
    container.innerHTML = html;
}

window.addToCart = function(name, price) {
    const existing = cart.find(i => i.name === name);
    if (existing) existing.qty++;
    else cart.push({ name, price, qty: 1 });
    
    updateCartDisplay();
};

function updateCartDisplay() {
    const footer = document.getElementById('cart-footer');
    const totalEl = document.getElementById('cart-total');
    const countEl = document.getElementById('cart-count');
    
    let total = cart.reduce((s, i) => s + (i.price * i.qty), 0);
    let count = cart.reduce((s, i) => s + i.qty, 0);

    if (count > 0) {
        footer.style.display = 'block';
        totalEl.innerText = total;
        countEl.innerText = count + " Items Selected";
    }
}

window.sendToWhatsApp = function() {
    let msg = "*New Order - RSK Royal Kitchen*%0A--------------------------%0A";
    let total = 0;
    cart.forEach((item, index) => {
        msg += `${index+1}. ${item.name} x ${item.qty} = ₹${item.price * item.qty}%0A`;
        total += (item.price * item.qty);
    });
    msg += "--------------------------%0A";
    msg += `*Total Amount: ₹${total}*`;
    
    window.open(`https://wa.me/${RSK_PHONE}?text=${msg}`, '_blank');
};

// Start
document.addEventListener('DOMContentLoaded', renderMenu);
</script>
