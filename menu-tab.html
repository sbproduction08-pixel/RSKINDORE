<style>
    .cat-section { margin-bottom: 30px; }
    .section-banner { width: 100%; border-radius: 12px; border: 1px solid var(--gold); margin-bottom: 15px; }
    .cat-title { color: var(--gold); font-size: 16px; font-weight: bold; border-left: 4px solid var(--gold); padding-left: 12px; margin-bottom: 15px; text-transform: uppercase; }
    .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .item-card { background: rgba(255,255,255,0.05); border: 1px solid #333; border-radius: 10px; padding: 12px; display: flex; flex-direction: column; justify-content: space-between; }
    .price-info { color: var(--gold); font-size: 13px; font-weight: bold; margin: 8px 0; }
    .add-btn-menu { background: #fff; color: #000; border: none; padding: 10px; border-radius: 5px; font-size: 10px; font-weight: bold; cursor: pointer; width: 100%; text-transform: uppercase; }
    
    /* Fixed Checkout Footer */
    #floatingCheckout { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; background: #25D366; color: #fff; padding: 15px; border-radius: 50px; display: none; justify-content: center; align-items: center; font-weight: bold; box-shadow: 0 5px 20px #000; z-index: 1000; border: none; cursor: pointer; }
</style>

<div id="dynamic-menu-area"></div>

<button id="floatingCheckout" onclick="window.checkout()">
    🚀 PLACE ORDER (WHATSAPP)
</button>

<script>
(function() {
    const area = document.getElementById('dynamic-menu-area');
    if(!window.menuData) {
        area.innerHTML = "<div style='color:red; text-align:center;'>Menu Data Load Nahi Hua!</div>";
        return;
    }

    // Menu Rendering
    window.menuData.forEach(section => {
        let html = `
            <div class="cat-section">
                <img src="${section.sectionPhoto}" class="section-banner">
                <div class="cat-title">${section.sectionName}</div>
                <div class="menu-grid">
        `;

        section.items.forEach(item => {
            if(item.type === "single") {
                html += `
                    <div class="item-card">
                        <div style="font-size:13px;"><b>${item.name}</b></div>
                        <div class="price-info">₹${item.price}</div>
                        <button class="add-btn-menu" onclick="window.addToCart('${item.name}', ${item.price})">+ ADD</button>
                    </div>`;
            } else {
                html += `
                    <div class="item-card">
                        <div style="font-size:13px;"><b>${item.name}</b></div>
                        <div class="price-info">H: ₹${item.halfPrice} | F: ₹${item.fullPrice}</div>
                        <button class="add-btn-menu" style="margin-bottom:5px;" onclick="window.addToCart('${item.name} (H)', ${item.halfPrice})">ADD HALF</button>
                        <button class="add-btn-menu" onclick="window.addToCart('${item.name} (F)', ${item.fullPrice})">ADD FULL</button>
                    </div>`;
            }
        });
        html += `</div></div>`;
        area.innerHTML += html;
    });
})();
</script>
