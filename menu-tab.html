<script src="item_menu_code.js"></script>

<style>
    .menu-tab-content { padding-bottom: 120px; color: #fff; }
    .cat-section { margin-bottom: 30px; }
    .section-banner { width: 100%; border-radius: 12px; border: 1px solid #D4AF37; margin-bottom: 15px; }
    .cat-title { color: #D4AF37; font-size: 16px; font-weight: bold; border-left: 4px solid #D4AF37; padding-left: 12px; margin-bottom: 15px; }
    .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .item-card { background: rgba(255,255,255,0.05); border: 1px solid #222; border-radius: 10px; padding: 12px; display: flex; flex-direction: column; justify-content: space-between; }
    .price-tag { color: #D4AF37; font-weight: bold; margin: 8px 0; font-size: 13px; }
    .add-btn { background: #fff; color: #000; border: none; padding: 8px; border-radius: 5px; font-size: 10px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 5px; }
    
    /* Footer & Token Styles */
    .checkout-footer { position: fixed; bottom: 85px; left: 0; width: 100%; display: none; justify-content: center; z-index: 999; }
    .place-order-btn { background: #25D366; color: #fff; border: none; padding: 15px 30px; border-radius: 50px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px #000; }
    #tokenModal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #111; border: 2px solid #D4AF37; padding: 25px; border-radius: 15px; text-align: center; z-index: 10000; display: none; width: 250px; }
</style>

<div class="menu-tab-content" id="menuDisplay">
    </div>

<div id="tokenModal">
    <b style="color:#D4AF37">ROYAL KITCHEN</b>
    <p style="font-size:12px;">Your Token Number:</p>
    <h1 id="tokenNum" style="color:#D4AF37; font-size:50px; margin:10px 0;">01</h1>
    <button class="add-btn" id="confirmOrder" style="background:#D4AF37">CONFIRM & WHATSAPP</button>
</div>

<div class="checkout-footer" id="floatingCart">
    <button class="place-order-btn" id="checkoutBtn">🚀 SEND ORDER ON WHATSAPP</button>
</div>

<script>
(function() {
    let cart = [];
    const ADMIN_NO = "917489999890";
    const displayContainer = document.getElementById('menuDisplay');

    // 1. Menu Render Function (Data se HTML banana)
    menuData.forEach(section => {
        let sectionHTML = `
            <div class="cat-section">
                <img src="${section.sectionPhoto}" class="section-banner">
                <div class="cat-title">${section.sectionName}</div>
                <div class="menu-grid">
        `;

        section.items.forEach(item => {
            if(item.type === "single") {
                sectionHTML += `
                    <div class="item-card">
                        <div><b>${item.name}</b></div>
                        <div class="price-tag">₹${item.price}</div>
                        <button class="add-btn" onclick="addToCart('${item.name}', ${item.price})">+ ADD</button>
                    </div>`;
            } else {
                sectionHTML += `
                    <div class="item-card">
                        <div><b>${item.name}</b></div>
                        <div class="price-tag">H: ₹${item.halfPrice} | F: ₹${item.fullPrice}</div>
                        <button class="add-btn" onclick="addToCart('${item.name} (Half)', ${item.halfPrice})">ADD HALF</button>
                        <button class="add-btn" onclick="addToCart('${item.name} (Full)', ${item.fullPrice})">ADD FULL</button>
                    </div>`;
            }
        });

        sectionHTML += `</div></div>`;
        displayContainer.innerHTML += sectionHTML;
    });

    // 2. Add to Cart Logic
    window.addToCart = function(name, price) {
        cart.push({ n: name, p: price });
        document.getElementById('floatingCart').style.display = 'flex';
        alert(name + " Added!");
    };

    // 3. Checkout & Token Logic
    document.getElementById('checkoutBtn').onclick = function() {
        let today = new Date().toDateString();
        let count = (localStorage.getItem('rDate') === today) ? parseInt(localStorage.getItem('rCount')) + 1 : 1;
        localStorage.setItem('rDate', today);
        localStorage.setItem('rCount', count);
        let tkn = count.toString().padStart(2, '0');

        document.getElementById('tokenNum').innerText = tkn;
        document.getElementById('tokenModal').style.display = 'block';

        // Parchi formation
        let parchi = "🏷️ *TOKEN: " + tkn + "*\n━━━━━━━━━━━━━━━\n";
        let total = 0;
        cart.forEach((it, i) => {
            parchi += (i+1) + ". " + it.n + " - ₹" + it.p + "\n";
            total += it.p;
        });
        parchi += "━━━━━━━━━━━━━━━\n*TOTAL: ₹" + total + "*";

        document.getElementById('confirmOrder').onclick = function() {
            window.location.href = "https://api.whatsapp.com/send?phone=" + ADMIN_NO + "&text=" + encodeURIComponent(parchi);
        };
    };
})();
</script>
