<div id="dynamic-menu-render">
    </div>

<button id="floatingCheckout" onclick="window.checkout()" style="display:none; position:fixed; bottom:85px; left:50%; transform:translateX(-50%); width:90%; background:#25D366; color:#fff; padding:16px; border-radius:50px; font-weight:900; border:none; z-index:2100;">
    🚀 PLACE ORDER (WHATSAPP)
</button>

<script>
(function() {
    const renderArea = document.getElementById('dynamic-menu-render');
    
    // Superfast Render Function
    function renderMenu() {
        if (!window.menuData) {
            renderArea.innerHTML = "<div style='text-align:center; padding:40px; color:#D4AF37;'>Data load ho raha hai...</div>";
            return;
        }

        let fullHTML = "";
        window.menuData.forEach(section => {
            let sectionHTML = `
                <div class="cat-section" style="margin-bottom:30px;">
                    <img src="${section.sectionPhoto}" style="width:100%; border-radius:12px; border:1px solid #D4AF37; margin-bottom:15px;">
                    <div style="color:#D4AF37; font-size:16px; font-weight:bold; border-left:4px solid #D4AF37; padding-left:12px; margin-bottom:15px; text-transform:uppercase;">${section.sectionName}</div>
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
            `;

            section.items.forEach(item => {
                if (item.type === "single") {
                    sectionHTML += `
                        <div style="background:rgba(255,255,255,0.05); border:1px solid #333; border-radius:12px; padding:12px; display:flex; flex-direction:column; justify-content:space-between;">
                            <div style="font-size:13px; font-weight:600;">${item.name}</div>
                            <div style="color:#D4AF37; font-size:13px; font-weight:bold; margin:8px 0;">₹${item.price}</div>
                            <button onclick="window.addToCart('${item.name}', ${item.price})" style="background:#fff; color:#000; border:none; padding:10px; border-radius:6px; font-size:10px; font-weight:800; cursor:pointer; text-transform:uppercase;">+ ADD</button>
                        </div>`;
                } else {
                    sectionHTML += `
                        <div style="background:rgba(255,255,255,0.05); border:1px solid #333; border-radius:12px; padding:12px; display:flex; flex-direction:column; justify-content:space-between;">
                            <div style="font-size:13px; font-weight:600;">${item.name}</div>
                            <div style="color:#D4AF37; font-size:13px; font-weight:bold; margin:8px 0;">H: ₹${item.halfPrice} | F: ₹${item.fullPrice}</div>
                            <button onclick="window.addToCart('${item.name} (H)', ${item.halfPrice})" style="background:#f0f0f0; color:#000; border:none; padding:10px; border-radius:6px; font-size:10px; font-weight:800; cursor:pointer; text-transform:uppercase; margin-bottom:5px;">ADD HALF</button>
                            <button onclick="window.addToCart('${item.name} (F)', ${item.fullPrice})" style="background:#fff; color:#000; border:none; padding:10px; border-radius:6px; font-size:10px; font-weight:800; cursor:pointer; text-transform:uppercase;">ADD FULL</button>
                        </div>`;
                }
            });
            sectionHTML += `</div></div>`;
            fullHTML += sectionHTML;
        });
        
        renderArea.innerHTML = fullHTML;
        
        // Checkout button check
        if (window.cart && window.cart.length > 0) {
            document.getElementById('floatingCheckout').style.display = 'flex';
        }
    }

    // Jhapak se call karo
    renderMenu();
})();
</script>
