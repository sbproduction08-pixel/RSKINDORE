<style>
    .menu-header { color: var(--gold); font-family: 'Marcellus', serif; text-align: center; border-bottom: 1px solid var(--gold); padding-bottom: 10px; margin-bottom: 20px; text-transform: uppercase; }
    
    /* Search Bar */
    .search-box { width:100%; padding:15px; border-radius:30px; border:1px solid var(--gold); background:#1a1a1a; color:#fff; margin-bottom:25px; outline:none; box-sizing:border-box; font-size: 15px; }

    /* Menu Grid */
    .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .item-card { background: rgba(255,255,255,0.05); border-radius: 8px; padding: 12px; display: flex; flex-direction: column; justify-content: space-between; border: 0.5px solid #333; }
    .item-name { font-size: 13px; font-weight: bold; color: #fff; min-height: 35px; margin-bottom: 5px; }
    .price-tag { color: var(--gold); font-size: 12px; font-weight: bold; margin-bottom: 10px; }

    /* Counter & Add Buttons - FIXED LOGIC */
    .btn-container { min-height: 40px; display: flex; align-items: center; justify-content: center; width: 100%; }
    .add-btn { background: #fff; color: #000; border: none; padding: 10px; border-radius: 6px; font-size: 11px; font-weight: 800; cursor: pointer; width: 100%; }
    .add-btn.gold { background: var(--gold); }
    
    .counter-row { display: flex; align-items: center; justify-content: space-between; background: var(--gold); border-radius: 6px; padding: 5px; width: 100%; }
    .count-btn { background: none; border: none; color: #000; font-size: 20px; font-weight: bold; width: 30px; cursor: pointer; line-height: 1; }
    .count-val { color: #000; font-weight: 900; font-size: 15px; }

    /* Floating Cart Bar */
    .cart-bar { position: fixed; bottom: 85px; left: 5%; width: 90%; background: var(--gold); color: #000; padding: 15px; border-radius: 50px; display: none; justify-content: space-between; z-index: 3000; box-shadow: 0 5px 25px #000; font-weight: 900; }
</style>

<div class="menu-tab">
    <h2 class="menu-header">ROYAL TEST MENU</h2>
    
    <input type="text" id="menuSearch" class="search-box" placeholder="🔍 Search (e.g. Chicken, Rice)" onkeyup="runSearch()">

    <div class="menu-grid">
        <div class="item-card dish-item" data-name="tawa chicken combo">
            <div class="item-name">Tawa Chicken Combo</div>
            <div class="price-tag">₹259</div>
            <div class="btn-container" id="con-item1">
                <button class="add-btn gold" onclick="updateQty('Tawa Chicken Combo', 259, 1, 'item1')">+ Add Combo</button>
            </div>
        </div>

        <div class="item-card dish-item" data-name="rsk special chicken half">
            <div class="item-name">RSK Chicken (Half)</div>
            <div class="price-tag">₹219</div>
            <div class="btn-container" id="con-item2">
                <button class="add-btn" onclick="updateQty('RSK Chicken (Half)', 219, 1, 'item2')">+ Add Half</button>
            </div>
        </div>

        <div class="item-card dish-item" data-name="chicken fried rice">
            <div class="item-name">Chicken Fried Rice</div>
            <div class="price-tag">₹149</div>
            <div class="btn-container" id="con-item3">
                <button class="add-btn gold" onclick="updateQty('Chicken Fried Rice', 149, 1, 'item3')">+ Add Rice</button>
            </div>
        </div>
    </div>

    <div class="cart-bar" id="cartBar">
        <span id="cartSummary">0 Items | ₹0</span>
        <span onclick="alert('WhatsApp pe order jayega!')">CHECKOUT 🛒</span>
    </div>
</div>

<script>
    let myCart = {};

    function updateQty(name, price, delta, id) {
        if (!myCart[name]) {
            myCart[name] = { price: price, qty: 0 };
        }
        
        myCart[name].qty += delta;
        
        if (myCart[name].qty <= 0) {
            delete myCart[name];
        }

        renderButton(name, price, id);
        updateCartTotal();
    }

    function renderButton(name, price, id) {
        const container = document.getElementById('con-' + id);
        const currentQty = myCart[name] ? myCart[name].qty : 0;

        if (currentQty > 0) {
            container.innerHTML = `
                <div class="counter-row">
                    <button class="count-btn" onclick="updateQty('${name}', ${price}, -1, '${id}')">−</button>
                    <span class="count-val">${currentQty}</span>
                    <button class="count-btn" onclick="updateQty('${name}', ${price}, 1, '${id}')">+</button>
                </div>
            `;
        } else {
            const isGold = name.includes('Combo') || name.includes('Rice');
            container.innerHTML = `
                <button class="add-btn ${isGold?'gold':''}" onclick="updateQty('${name}', ${price}, 1, '${id}')">
                    + Add
                </button>
            `;
        }
    }

    function updateCartTotal() {
        let total = 0;
        let count = 0;
        for (let key in myCart) {
            total += myCart[key].price * myCart[key].qty;
            count += myCart[key].qty;
        }
        
        const bar = document.getElementById('cartBar');
        if (count > 0) {
            bar.style.display = 'flex';
            document.getElementById('cartSummary').innerText = count + " Items | ₹" + total;
        } else {
            bar.style.display = 'none';
        }
    }

    function runSearch() {
        let q = document.getElementById('menuSearch').value.toLowerCase();
        document.querySelectorAll('.dish-item').forEach(item => {
            let name = item.getAttribute('data-name').toLowerCase();
            item.style.display = name.includes(q) ? "flex" : "none";
        });
    }
</script>
