<style>
    .menu-header { color: var(--gold); font-family: 'Marcellus', serif; text-align: center; border-bottom: 1px solid var(--gold); padding-bottom: 10px; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; }

    /* --- ROYAL COMBO: HERO BOX ON RIGHT --- */
    .combo-section { display: flex; justify-content: flex-end; margin-bottom: 30px; padding: 0 10px; }
    .royal-combo-box { 
        width: 200px; background: linear-gradient(145deg, #1a1a1a, #000);
        border: 2px solid var(--gold); border-radius: 15px; overflow: hidden;
        box-shadow: 0 0 20px rgba(212,175,55,0.4);
    }
    .combo-img-top { width: 100%; height: 130px; object-fit: cover; border-bottom: 1px solid var(--gold); }
    .combo-info { padding: 12px; text-align: center; }
    .combo-title { font-size: 14px; font-weight: bold; color: var(--gold); margin-bottom: 8px; font-family: 'Marcellus', serif; line-height: 1.2; }

    /* --- SECTION HEADERS: LEFT ALIGNED WITH CIRCLE IMAGE --- */
    .section-header { display: flex; align-items: center; gap: 15px; margin: 35px 0 15px; padding-left: 5px; }
    .section-icon { width: 55px; height: 55px; border-radius: 50%; border: 2px solid var(--gold); object-fit: cover; box-shadow: 0 0 12px rgba(212,175,55,0.3); }
    .cat-title { color: var(--gold); font-size: 16px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }

    /* --- MENU GRID & CARDS --- */
    .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding-bottom: 10px; }
    .item-card { background: rgba(255,255,255,0.05); border-left: 3px solid var(--gold); border-radius: 8px; padding: 12px; display: flex; flex-direction: column; justify-content: space-between; }
    .item-name { font-size: 12px; font-weight: bold; color: #fff; margin-bottom: 5px; min-height: 32px; }
    .price-tag { color: var(--gold); font-size: 11px; font-weight: bold; margin-bottom: 10px; }

    /* Buttons Style (Updated for Half/Full) */
    .btn-row { display: flex; gap: 5px; margin-top: auto; }
    .add-btn { background: #fff; color: #000; border: none; padding: 10px 5px; border-radius: 4px; font-size: 10px; font-weight: bold; width: 100%; cursor: pointer; transition: 0.2s; text-transform: uppercase; }
    .half-btn { background: #eee; flex: 1; }
    .full-btn { background: #fff; flex: 1; border: 1px solid var(--gold); }
    .add-btn:active { background: var(--gold); transform: scale(0.95); }

    /* Bottom Spacing & Floating Button */
    .checkout-wrap { position: fixed; bottom: 85px; left: 0; width: 100%; display: none; justify-content: center; z-index: 2000; }
    .place-order-btn { background: var(--gold); color: #000; border: none; padding: 15px 40px; border-radius: 50px; font-weight: 900; box-shadow: 0 5px 20px #000; cursor: pointer; }
</style>

<div class="menu-tab">
    <h2 class="menu-header">Royal Menu</h2>

    <div class="combo-section">
        <div class="royal-combo-box">
            <img src="ROYAL COMBO.jpg" class="combo-img-top">
            <div class="combo-info">
                <div class="combo-title">Tawa Chicken + Paratha</div>
                <div class="price-tag">₹259</div>
                <button class="add-btn" onclick="window.addToCart('Tawa Chicken Combo', 259)">+ Add Combo</button>
            </div>
        </div>
    </div>

    <div class="section-header">
        <img src="nonveg-photo.jpg" class="section-icon">
        <span class="cat-title">Non-Veg Specials</span>
    </div>
    <div class="menu-grid">
        <div class="item-card">
            <div class="item-name">RSK Special Chicken</div>
            <div class="price-tag">Half: ₹219 / Full: ₹399</div>
            <div class="btn-row">
                <button class="add-btn half-btn" onclick="window.addToCart('RSK Special Chicken (Half)', 219)">Half</button>
                <button class="add-btn full-btn" onclick="window.addToCart('RSK Special Chicken (Full)', 399)">Full</button>
            </div>
        </div>
        <div class="item-card">
            <div class="item-name">Tawa Chicken</div>
            <div class="price-tag">Half: ₹229 / Full: ₹409</div>
            <div class="btn-row">
                <button class="add-btn half-btn" onclick="window.addToCart('Tawa Chicken (Half)', 229)">Half</button>
                <button class="add-btn full-btn" onclick="window.addToCart('Tawa Chicken (Full)', 409)">Full</button>
            </div>
        </div>
        </div>

    <div class="section-header">
        <img src="veg-photo.jpg" class="section-icon">
        <span class="cat-title">Veg Delights</span>
    </div>
    <div class="menu-grid">
        <div class="item-card">
            <div class="item-name">Kastoori Paneer</div>
            <div class="price-tag">₹179</div>
            <button class="add-btn" onclick="window.addToCart('Kastoori Paneer', 179)">+ Add to Cart</button>
        </div>
        <div class="item-card">
            <div class="item-name">Paneer Bhurji</div>
            <div class="price-tag">₹189</div>
            <button class="add-btn" onclick="window.addToCart('Paneer Bhurji', 189)">+ Add to Cart</button>
        </div>
    </div>

    <div style="height: 120px;"></div>

    <div class="checkout-wrap" id="floatingCheckout">
        <button class="place-order-btn" onclick="window.checkout()">🚀 PLACE ORDER (Get Token)</button>
    </div>
</div>
