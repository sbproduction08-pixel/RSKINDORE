<style>
    /* Design Basics */
    .menu-header { color: #D4AF37; font-family: 'Marcellus', serif; text-align: center; border-bottom: 2px solid #D4AF37; padding-bottom: 10px; margin-bottom: 20px; text-transform: uppercase; }
    .search-box { width:100%; padding:15px; border-radius:30px; border:1px solid #D4AF37; background:#1a1a1a; color:#fff; margin-bottom:20px; outline:none; box-sizing:border-box; font-size: 16px; }

    /* Menu Grid */
    .cat-title { color: #D4AF37; font-size: 16px; font-weight: bold; text-transform: uppercase; margin: 25px 0 10px; display: block; border-left: 4px solid #D4AF37; padding-left: 10px; }
    .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 100px; }
    .item-card { background: rgba(255,255,255,0.07); border-radius: 10px; padding: 12px; border: 1px solid #333; display: flex; flex-direction: column; justify-content: space-between; }
    .item-name { font-size: 13px; font-weight: bold; color: #fff; min-height: 35px; margin-bottom: 5px; }
    .price-tag { color: #D4AF37; font-size: 12px; font-weight: bold; margin-bottom: 10px; }
    
    /* Add Button */
    .add-btn { background: #fff; color: #000; border: none; padding: 10px; border-radius: 5px; font-size: 12px; font-weight: 800; cursor: pointer; width: 100%; transition: 0.2s; }
    .add-btn:active { background: #D4AF37; transform: scale(0.95); }

    /* Bottom Checkout Bar */
    #checkoutBar { 
        position: fixed; bottom: 85px; left: 0; width: 100%; 
        background: #D4AF37; color: #000; padding: 15px 20px; 
        display: none; justify-content: space-between; align-items: center; 
        font-weight: 900; box-shadow: 0 -5px 15px rgba(0,0,0,0.5); z-index: 9999;
        box-sizing: border-box; 
    }
</style>

<div class="menu-tab">
    <h2 class="menu-header">ROYAL STREET KITCHEN</h2>
    
    <input type="text" id="rskSearch" class="search-box" placeholder="🔍 Dish dhundein..." onkeyup="filterDish()">

    <div id="menuContainer">
        <span class="cat-title">👑 Royal Combos</span>
        <div class="menu-grid">
            <div class="dish-unit" data-name="tawa chicken paratha combo">
                <div class="item-card">
                    <div class="item-name">Tawa Chicken + Paratha</div>
                    <div class="price-tag">₹259</div>
                    <button class="add-btn" onclick="addDish('Tawa Chicken Combo', 259)">+ ADD</button>
                </div>
            </div>
            <div class="dish-unit" data-name="paneer bhurji combo">
                <div class="item-card">
                    <div class="item-name">Paneer Bhurji Combo</div>
                    <div class="price-tag">₹209</div>
                    <button class="add-btn" onclick="addDish('Paneer Bhurji Combo', 209)">+ ADD</button>
                </div>
            </div>
        </div>

        <span class="cat-title">🍚 Rice & Breads</span>
        <div class="menu-grid">
            <div class="dish-unit" data-name="chicken fried rice">
                <div class="item-card">
                    <div class="item-name">Chicken Fried Rice</div>
                    <div class="price-tag">₹149</div>
                    <button class="add-btn" onclick="addDish('Chicken Fried Rice', 149)">+ ADD</button>
                </div>
            </div>
        </div>
    </div>

    <div id="checkoutBar" onclick="goToWhatsApp()">
        <div id="barInfo">0 Items | ₹0</div>
        <div style="letter-spacing: 1px;">CHECKOUT ➔</div>
    </div>
</div>

<script>
    // Cart in memory
    var rskCart = [];

    function addDish(name, price) {
        // Simple Add
        rskCart.push({n: name, p: price});
        
        // Update Bar
        var total = 0;
        for(var i=0; i < rskCart.length; i++) { total += rskCart[i].p; }
        
        var bar = document.getElementById('checkoutBar');
        bar.style.display = 'flex';
        document.getElementById('barInfo').innerText = rskCart.length + " Items | ₹" + total;
        
        console.log("Added: " + name);
    }

    function filterDish() {
        var input = document.getElementById('rskSearch').value.toLowerCase();
        var items = document.getElementsByClassName('dish-unit');
        
        for (var i = 0; i < items.length; i++) {
            var dishName = items[i].getAttribute('data-name');
            if (dishName.includes(input)) {
                items[i].style.display = "block";
            } else {
                items[i].style.display = "none";
            }
        }
    }

    function goToWhatsApp() {
        if(rskCart.length === 0) return;

        var bill = 0;
        var list = "";
        for(var i=0; i < rskCart.length; i++) {
            list += "- " + rskCart[i].n + " (₹" + rskCart[i].p + ")%0A";
            bill += rskCart[i].p;
        }

        // Token Number
        var token = "RSK-" + Math.floor(100 + Math.random() * 900);

        // WhatsApp Format
        var waText = "*--- ROYAL STREET KITCHEN ---*%0A";
        waText += "*TOKEN: " + token + "*%0A%0A";
        waText += "*ORDER:*%0A" + list;
        waText += "%0A*TOTAL: ₹" + bill + "*%0A%0A";
        waText += "Coming to pick it up!";

        window.open("https://wa.me/7489999890?text=" + waText, "_blank");
        
        // Reset
        rskCart = [];
        document.getElementById('checkoutBar').style.display = 'none';
    }
</script>
