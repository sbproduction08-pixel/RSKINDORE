<style>
    .menu-header { color: var(--gold); font-family: 'Marcellus', serif; text-align: center; border-bottom: 1px solid var(--gold); padding-bottom: 10px; margin-bottom: 20px; text-transform: uppercase; }
    
    /* Search Box */
    .search-box { width:100%; padding:15px; border-radius:30px; border:1px solid var(--gold); background:#1a1a1a; color:#fff; margin-bottom:10px; outline:none; box-sizing:border-box; }

    /* Category Filters */
    .filter-scroll { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 15px; margin-bottom: 20px; scrollbar-width: none; }
    .filter-scroll::-webkit-scrollbar { display: none; }
    .filter-btn { 
        background: rgba(255,255,255,0.05); border: 1px solid #444; color: #ccc; 
        padding: 8px 18px; border-radius: 20px; font-size: 11px; white-space: nowrap; 
        cursor: pointer; font-weight: bold; transition: 0.3s;
    }
    .filter-btn.active { background: var(--gold); color: #000; border-color: var(--gold); box-shadow: 0 0 10px var(--gold); }

    /* --- HERO SECTION: ROYAL COMBO ONLY --- */
    .hero-card { 
        background: #111; border: 2px solid var(--gold); border-radius: 15px; 
        overflow: hidden; margin-bottom: 30px; box-shadow: 0 0 20px rgba(212,175,55,0.3);
        transition: transform 0.4s;
    }
    .hero-card:hover { transform: scale(1.02); }
    .hero-img { width: 100%; height: 200px; object-fit: cover; }
    .hero-content { padding: 15px; text-align: center; }

    /* --- SECTION BANNERS WITH HIGHLIGHT --- */
    .img-wrap { width: 100%; height: 120px; border-radius: 10px; overflow: hidden; margin: 30px 0 15px; border: 1px solid rgba(212,175,55,0.4); }
    .section-banner { 
        width: 100%; height: 100%; object-fit: cover; 
        transition: transform 0.5s ease, filter 0.5s ease;
    }
    .img-wrap:hover .section-banner { transform: scale(1.1); filter: brightness(1.2); }
    .cat-title { color: var(--gold); font-size: 18px; font-weight: bold; text-transform: uppercase; margin-bottom: 15px; display: block; }

    /* --- GRID & CARDS --- */
    .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .item-card { background: rgba(255,255,255,0.05); border-left: 3px solid var(--gold); border-radius: 8px; padding: 12px; display: flex; flex-direction: column; transition: 0.3s; }
    .item-card:hover { background: rgba(255,255,255,0.1); border-left-width: 6px; }
    .item-name { font-size: 13px; font-weight: bold; color: #fff; margin-bottom: 5px; min-height: 35px; }
    .price-tag { color: var(--gold); font-size: 11px; font-weight: bold; margin-bottom: 10px; }

    .btn-row { display: flex; gap: 5px; margin-top: auto; }
    .order-btn { background: var(--gold); color: #000; border: none; padding: 10px; border-radius: 6px; font-size: 10px; font-weight: 800; cursor: pointer; width: 100%; }
    .half-btn { background: #ddd; flex: 1; }
    .full-btn { background: var(--gold); flex: 1; }

    .checkout-wrap { position: fixed; bottom: 85px; left: 0; width: 100%; display: none; justify-content: center; z-index: 2000; }
    .place-order-btn { background: var(--gold); color: #000; border: none; padding: 15px 40px; border-radius: 50px; font-weight: 900; box-shadow: 0 5px 20px #000; cursor: pointer; }
</style>

<div class="menu-tab">
    <h2 class="menu-header">ROYAL MENU</h2>
    
    <input type="text" id="menuSearch" class="search-box" placeholder="Kya khaoge? (Search 42+ items...)" onkeyup="runFilters()">
    <div class="filter-scroll">
        <button class="filter-btn active" onclick="setCat('all', this)">All</button>
        <button class="filter-btn" onclick="setCat('combo', this)">Combos</button>
        <button class="filter-btn" onclick="setCat('nonveg', this)">Non-Veg</button>
        <button class="filter-btn" onclick="setCat('veg', this)">Veg</button>
        <button class="filter-btn" onclick="setCat('maggie', this)">Maggie</button>
        <button class="filter-btn" onclick="setCat('egg', this)">Egg Station</button>
    </div>

    <div class="section-group" data-cat="combo">
        <span class="cat-title">👑 The Royal Hero</span>
        <div class="hero-card dish-item" data-name="tawa chicken paratha combo">
            <img src="ROYAL COMBO.jpg" class="hero-img">
            <div class="hero-content">
                <div class="item-name">Tawa Chicken + Paratha</div>
                <div class="price-tag">₹259</div>
                <button class="order-btn" onclick="window.addToCart('Tawa Chicken Combo', 259)">+ Add Royal Combo</button>
            </div>
        </div>
    </div>

    <div class="section-group" data-cat="nonveg">
        <div class="img-wrap"><img src="https://images.unsplash.com/photo-1598515214211-89d3c73ae83b?q=80&w=1000&auto=format&fit=crop" class="section-banner"></div>
        <span class="cat-title">🍗 Non-Veg Specials</span>
        <div class="menu-grid">
            <div class="item-card dish-item" data-name="rsk special chicken half full">
                <div class="item-name">RSK Special Chicken</div><div class="price-tag">Half: ₹219 / Full: ₹399</div>
                <div class="btn-row"><button class="order-btn half-btn" onclick="window.addToCart('RSK Chicken (H)', 219)">Half</button><button class="order-btn full-btn" onclick="window.addToCart('RSK Chicken (F)', 399)">Full</button></div>
            </div>
            <div class="item-card dish-item" data-name="tawa chicken half full">
                <div class="item-name">Tawa Chicken</div><div class="price-tag">Half: ₹229 / Full: ₹409</div>
                <div class="btn-row"><button class="order-btn half-btn" onclick="window.addToCart('Tawa Chicken (H)', 229)">Half</button><button class="order-btn full-btn" onclick="window.addToCart('Tawa Chicken (F)', 409)">Full</button></div>
            </div>
        </div>
    </div>

    <div class="section-group" data-cat="veg">
        <div class="img-wrap"><img src="https://images.unsplash.com/photo-1631452180519-c014fe946bc7?q=80&w=1000&auto=format&fit=crop" class="section-banner"></div>
        <span class="cat-title">🌿 Veg Delights</span>
        <div class="menu-grid">
            <div class="item-card dish-item" data-name="kastoori paneer"><div class="item-name">Kastoori Paneer</div><div class="price-tag">₹179</div><button class="order-btn" onclick="window.addToCart('Kastoori Paneer', 179)">+ Add</button></div>
            <div class="item-card dish-item" data-name="paneer bhurji"><div class="item-name">Paneer Bhurji</div><div class="price-tag">₹189</div><button class="order-btn" onclick="window.addToCart('Paneer Bhurji', 189)">+ Add</button></div>
        </div>
    </div>

    <div class="section-group" data-cat="veg">
        <div class="img-wrap"><img src="https://images.unsplash.com/photo-1512058560566-42724afbc2aa?q=80&w=1000&auto=format&fit=crop" class="section-banner"></div>
        <span class="cat-title">🍚 Rice & Breads</span>
        <div class="menu-grid">
            <div class="item-card dish-item" data-name="chicken fried rice"><div class="item-name">Chicken Fried Rice</div><div class="price-tag">₹149</div><button class="order-btn" onclick="window.addToCart('Chicken Fried Rice', 149)">+ Add</button></div>
            <div class="item-card dish-item" data-name="paratha kulcha"><div class="item-name">Paratha / Kulcha</div><div class="price-tag">₹20 - ₹25</div><button class="order-btn" onclick="window.addToCart('Bread', 25)">+ Add</button></div>
        </div>
    </div>

    <div style="height: 120px;"></div>
    <div class="checkout-wrap" id="floatingCheckout"><button class="place-order-btn" onclick="window.checkout()">🚀 PLACE ORDER (Get Token)</button></div>
</div>

<script>
    let currentCat = 'all';

    function setCat(cat, btn) {
        currentCat = cat;
        let btns = document.getElementsByClassName('filter-btn');
        for(let b of btns) b.classList.remove('active');
        btn.classList.add('active');
        runFilters();
    }

    function runFilters() {
        let query = document.getElementById('menuSearch').value.toLowerCase();
        let sections = document.getElementsByClassName('section-group');
        let items = document.getElementsByClassName('dish-item');

        for (let s of sections) {
            let catMatch = (currentCat === 'all' || s.getAttribute('data-cat') === currentCat);
            s.style.display = catMatch ? "block" : "none";
        }

        for (let i of items) {
            let name = i.getAttribute('data-name');
            let searchMatch = name.includes(query);
            i.style.display = searchMatch ? "" : "none";
        }
    }
</script>
