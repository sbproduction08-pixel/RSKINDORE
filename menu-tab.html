<style>
    .menu-header { color: #D4AF37; font-family: 'Marcellus', serif; text-align: center; border-bottom: 1px solid #D4AF37; padding-bottom: 10px; margin-bottom: 20px; text-transform: uppercase; }
    .search-box { width:100%; padding:15px; border-radius:30px; border:1px solid #D4AF37; background:#1a1a1a; color:#fff; margin-bottom:20px; outline:none; box-sizing:border-box; }

    .cat-title { color: #D4AF37; font-size: 16px; font-weight: bold; text-transform: uppercase; margin: 25px 0 10px; display: block; border-left: 4px solid #D4AF37; padding-left: 10px; }
    .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .item-card { background: rgba(255,255,255,0.05); border-radius: 8px; padding: 12px; border: 1px solid #333; display: flex; flex-direction: column; justify-content: space-between; }
    .item-name { font-size: 12px; font-weight: bold; color: #fff; min-height: 30px; }
    .price-tag { color: #D4AF37; font-size: 11px; font-weight: bold; margin-bottom: 8px; }
    .add-btn { background: #fff; color: #000; border: none; padding: 8px; border-radius: 5px; font-size: 10px; font-weight: 800; cursor: pointer; }

    /* CART BOX TRIGGER */
    .cart-box-trigger { 
        position: fixed; bottom: 90px; right: 20px; 
        background: #D4AF37; color: #000; width: 60px; height: 60px; 
        border-radius: 15px; display: flex; flex-direction: column; 
        align-items: center; justify-content: center; 
        box-shadow: 0 5px 20px rgba(0,0,0,0.5); z-index: 999; border: 2px solid #fff;
    }
    .cart-count-badge { position: absolute; top: -10px; left: -10px; background: #fff; color: #000; padding: 2px 8px; border-radius: 10px; font-weight: 900; font-size: 12px; border: 1px solid #000; }

    /* CART MODAL (OVERLAY) */
    .cart-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 10000; display: none; flex-direction: column; padding: 20px; box-sizing: border-box; }
    .cart-content { background: #1a1a1a; border: 2px solid #D4AF37; border-radius: 20px; padding: 20px; flex: 1; display: flex; flex-direction: column; }
    .cart-row { display: flex; justify-content: space-between; color: #fff; border-bottom: 1px solid #333; padding: 10px 0; font-size: 14px; }
    .cart-total { font-size: 20px; color: #D4AF37; font-weight: 900; text-align: right; padding: 15px 0; border-top: 2px solid #D4AF37; }

    .action-btn { padding: 15px; border-radius: 10px; border: none; font-weight: 900; font-size: 14px; cursor: pointer; width: 100%; margin-top: 10px; }
    .btn-confirm { background: #D4AF37; color: #000; }
    .btn-cancel { background: #ff4444; color: #fff; }
</style>

<div class="menu-tab">
    <h2 class="menu-header">RSK MENU</h2>
    <input type="text" id="menuSearch" class="search-box" placeholder="Search dish..." onkeyup="doSearch()">

    <div id="menu-items">
        <span class="cat-title">👑 Royal Combos</span>
        <div class="menu-grid">
            <div class="item dish" data-n="tawa chicken paratha combo"><div class="item-card"><div class="item-name">Tawa Chicken + Paratha</div><div class="price-tag">₹259</div><button class="add-btn" onclick="addItem('Tawa Chicken Combo', 259)">+ Add</button></div></div>
            </div>
    </div>

    <div class="cart-box-trigger" id="cartBox" onclick="tryOpeningCart()">
        <span class="cart-count-badge" id="badgeQty">0</span>
        <span style="font-size: 20px;">🛒</span>
        <span style="font-size: 10px; font-weight: bold;" id="boxTotal">₹0</span>
    </div>

    <div class="cart-overlay" id="cartOverlay">
        <div class="cart-content">
            <h2 style="color:#D4AF37;">Review Your Order</h2>
            <div id="cartItemsList" class="cart-items-list" style="flex:1; overflow-y:auto;"></div>
            <div class="cart-total" id="grandTotal">Total: ₹0</div>
            
            <button class="action-btn btn-confirm" onclick="finishOrder('Confirmed')">🚀 GET TOKEN & ORDER</button>
            <button class="action-btn btn-cancel" onclick="finishOrder('Cancelled')">❌ CANCEL ORDER</button>
            <button class="action-btn" style="background:#444; color:#fff;" onclick="closeCart()">CLOSE</button>
        </div>
    </div>
</div>

<script>
    var rskCart = [];
    var sheetURL = "https://script.google.com/macros/s/AKfycbzBPKkzFJT5Pqmn-_88ziR1nwcnoJWeXbIPjZGD4P9TYgTr45pcTt2yPxrYwTHe4HFe/exec";
    
    // Check if User is Logged In (Aapka login logic yahan check hoga)
    // Abhi ke liye dummy logic:
    var isLoggedIn = false; 

    function addItem(name, price) {
        rskCart.push({n: name, p: price});
        updateCartBox();
    }

    function updateCartBox() {
        var total = 0;
        for(var i=0; i<rskCart.length; i++) { total += rskCart[i].p; }
        document.getElementById('badgeQty').innerText = rskCart.length;
        document.getElementById('boxTotal').innerText = "₹" + total;
    }

    function tryOpeningCart() {
        if(rskCart.length === 0) {
            alert("Pehle kuch khana toh chuno!");
            return;
        }
        
        // Login Check
        if(!isLoggedIn) {
            alert("👑 Royal Access Required! Please Login/Register first.");
            // Agar website main file hai toh Safar tab activate karo
            if(window.showTab) window.showTab('safar'); 
            return;
        }
        
        openCart();
    }

    function openCart() {
        document.getElementById('cartOverlay').style.display = 'flex';
        var listHTML = ""; var total = 0;
        for(var i=0; i<rskCart.length; i++) {
            listHTML += `<div class="cart-row"><span>${rskCart[i].n}</span><span>₹${rskCart[i].p}</span></div>`;
            total += rskCart[i].p;
        }
        document.getElementById('cartItemsList').innerHTML = listHTML;
        document.getElementById('grandTotal').innerText = "Total Bill: ₹" + total;
    }

    function closeCart() { document.getElementById('cartOverlay').style.display = 'none'; }

    function finishOrder(status) {
        var itemsStr = ""; var total = 0;
        for(var i=0; i<rskCart.length; i++) { itemsStr += rskCart[i].n + ", "; total += rskCart[i].p; }

        // TOKEN GENERATION
        var tokenNo = "RSK-" + Math.floor(1000 + Math.random() * 9000);

        // Send to Google Sheet
        fetch(sheetURL, {
            method: "POST",
            mode: "no-cors",
            body: JSON.stringify({
                status: status, 
                customer: "Urvashi Khatri", // Login data se utha lena baad mein
                items: itemsStr, 
                total: total,
                token: tokenNo // Google Sheet mein token column zaroor rakhna
            })
        });

        if(status === 'Confirmed') {
            var msg = `*TOKEN: ${tokenNo}*%0A*Order:* ${itemsStr}%0A*Total:* ₹${total}`;
            window.open("https://wa.me/7489999890?text=" + msg, "_blank");
        } else {
            window.open("https://wa.me/7489999890?text=Order Cancelled by Customer", "_blank");
        }

        rskCart = []; updateCartBox(); closeCart();
    }

    function doSearch() {
        var q = document.getElementById('menuSearch').value.toLowerCase();
        var d = document.getElementsByClassName('dish');
        for(var i=0; i<d.length; i++) {
            d[i].style.display = d[i].getAttribute('data-n').includes(q) ? "block" : "none";
        }
    }
</script>
