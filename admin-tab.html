<script>
    // 1. URL aur Bell define karna (Jo missing tha)
    const adminBridge = 'https://script.google.com/macros/s/AKfycbzW74ZcMwYcbBsXa9YTExua--mx-AiY5dLmZsde9Qqpikrtkp_8OU8rjeJhy-FQiBM/exec';
    const bell = document.getElementById('kitchenBell');
    let lastKnownToken = parseInt(localStorage.getItem('lastProcessedToken')) || 0;

    // 2. Data Load Function (JSONP Fix)
    function refreshAdminData() {
        const callbackName = 'jsonp_' + Date.now();
        const script = document.createElement('script');
        script.id = 'temp-jsonp-script';
        
        window[callbackName] = function(data) { 
            renderOrders(data); 
            delete window[callbackName]; 
            const oldScript = document.getElementById('temp-jsonp-script');
            if(oldScript) oldScript.remove();
        };

        script.src = `${adminBridge}?action=readAdmin&callback=${callbackName}`;
        document.body.appendChild(script);
    }

    // 3. Render Orders (Design & Display)
    function renderOrders(orders) {
        const list = document.getElementById('admin-orders-list');
        let html = ""; let totalSale = 0; let todayCount = 0; let currentMaxToken = 0;
        const todayStr = new Date().toDateString();

        orders.reverse().forEach(order => {
            const dateObj = new Date(order.date);
            if(dateObj.toDateString() === todayStr) {
                todayCount++;
                if(order.status === "Done") totalSale += parseFloat(order.total || 0);
                
                let tNum = parseInt(order.token);
                if(tNum > currentMaxToken) currentMaxToken = tNum;
            }

            let statusClass = order.status === "Done" ? "status-done" : (order.status.includes("Cancelled") ? "status-cancelled" : "status-pending");
            
            let cancelDisplay = "";
            if(order.cancelTime && order.status.includes("Cancelled")) {
                const cTime = new Date(order.cancelTime).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                cancelDisplay = `<div style="color:#ff4444; font-size:10px; margin-top:5px;">❌ Cancelled At: ${cTime}</div>`;
            }

            html += `
                <div class="order-card" style="border: 2px solid ${order.status.includes('Cancelled') ? '#ff4444' : 'rgba(212,175,55,0.3)'}">
                    <span class="status-badge ${statusClass}">${order.status}</span>
                    <div style="color: var(--gold); font-size: 11px; font-weight:bold;">TOKEN #${order.token}</div>
                    <div style="font-weight:bold; font-size:16px;">${order.name}</div>
                    <div style="color:var(--gold); font-size:12px;">📱 ${order.phone}</div>
                    <div style="color:#bbb; font-size:12px; margin:10px 0;">${order.items}</div>
                    <div style="display:flex; justify-content:space-between; align-items:flex-end;">
                        <div>
                            <div style="font-weight:bold; font-size:18px; color:var(--gold);">₹${order.total}</div>
                            <div style="font-size:9px; color:#777;">Ordered: ${dateObj.toLocaleTimeString()}</div>
                            ${cancelDisplay}
                        </div>
                        ${order.status === 'Pending' ? `
                            <div style="display:flex; gap:5px;">
                                <button onclick="updateStatus('${order.token}', 'Cancelled By Admin')" style="background:#3a0d0d; color:#ff4444; border:1px solid #ff4444; padding:8px; border-radius:6px; font-size:10px; cursor:pointer;">CANCEL</button>
                                <button onclick="updateStatus('${order.token}', 'Done')" style="background:#25D366; color:#fff; border:none; padding:8px 12px; border-radius:6px; font-size:10px; font-weight:bold; cursor:pointer;">DONE</button>
                            </div>
                        ` : ''}
                    </div>
                </div>
            `;
        });

        // Naye order par Bell bajana
        if(currentMaxToken > lastKnownToken && lastKnownToken !== 0 && bell) {
            bell.play().catch(e => console.log("Bell sound need touch"));
        }
        if(currentMaxToken > 0) {
            lastKnownToken = currentMaxToken;
            localStorage.setItem('lastProcessedToken', currentMaxToken);
        }

        list.innerHTML = html || "<div style='text-align:center; padding:50px; color:#555;'>Aaj koi orders nahi hain.</div>";
        document.getElementById('admin-total-orders').innerText = todayCount;
        document.getElementById('admin-total-sale').innerText = totalSale.toLocaleString();
    }

    // 4. Update Function (Buttons Fix)
    window.updateStatus = function(token, newStatus) {
        if(!confirm(newStatus + " Token #" + token + "?")) return;
        
        fetch(adminBridge, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({ token: token, status: newStatus })
        }).then(() => {
            alert("Action Saved!");
            setTimeout(refreshAdminData, 1000);
        });
    };

    // Auto load
    refreshAdminData();
    setInterval(refreshAdminData, 30000);
</script>
